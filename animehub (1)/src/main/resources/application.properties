# ===== App info =====
spring.application.name=AnimeHub

# ===== Database (H2 in-memory - zero setup, resets every restart) =====
# Para sa MySQL/persistent DB, tingnan ang README.md
spring.datasource.url=jdbc:h2:mem:animehub;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 web console for inspecting the DB while developing -> http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===== Jackson: auto-map Jikan's snake_case JSON to our camelCase Java fields =====
spring.jackson.property-naming-strategy=SNAKE_CASE

# ===== Jikan API (https://docs.api.jikan.moe) =====
jikan.api.base-url=https://api.jikan.moe/v4
# Jikan public rate limit: ~3 req/sec, 60 req/min. Caching (see CacheConfig) keeps us under this.

# ===== Server =====
server.port=8080
server.error.include-message=always

# ===== Thymeleaf =====
# Set to true while developing so template edits show without restarting
spring.thymeleaf.cache=false

# ===== Logging =====
logging.level.com.animehub=DEBUG
