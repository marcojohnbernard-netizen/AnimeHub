<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(pageTitle)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' · AnimeHub'">AnimeHub</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>

<header class="site-header" th:fragment="header">
    <div class="header-inner">
        <a href="/" class="brand">Anime<span>Hub</span></a>

        <div class="header-right">
            <button type="button" class="search-toggle" id="searchToggleBtn" aria-label="Search" aria-expanded="false">🔍</button>
            <button type="button" class="menu-toggle" id="menuToggleBtn" aria-label="Menu" aria-expanded="false">☰</button>

            <div class="menu-panel" id="menuPanel">
                <div class="menu-user" sec:authorize="isAuthenticated()">
                    Signed in as <strong sec:authentication="name"></strong>
                </div>
                <a href="/">Home</a>
                <a href="/latest">Latest Anime</a>
                <a href="/trending">Trending</a>
                <a href="/ranking">Top Ranking</a>
                <a href="/complete">Complete Anime</a>
                <div class="menu-divider"></div>
                <a sec:authorize="isAuthenticated()" href="/watchlist">My List</a>
                <a href="/settings">Settings</a>
                <div class="menu-divider"></div>
                <form sec:authorize="isAuthenticated()" action="/logout" method="post">
                    <button type="submit">Logout</button>
                </form>
                <a sec:authorize="!isAuthenticated()" href="/login">Login</a>
                <a sec:authorize="!isAuthenticated()" href="/register">Sign Up</a>
            </div>
        </div>
    </div>

    <div class="search-drawer" id="searchDrawer">
        <form action="/search" method="get">
            <input type="text" name="q" placeholder="Search for an anime..." aria-label="Search anime" autofocus>
            <button type="submit" class="btn-primary">Search</button>
        </form>
    </div>
</header>

<footer class="site-footer" th:fragment="footer">
    <p>AnimeHub &middot; School project &middot; Anime info powered by <a href="https://jikan.moe" target="_blank" rel="noopener">Jikan API</a> (MyAnimeList data)</p>
    <script th:src="@{/js/main.js}"></script>
</footer>

</body>
</html>
