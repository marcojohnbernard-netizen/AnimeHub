<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Sign Up')}"></head>
<body>
<div th:replace="~{fragments :: header}"></div>

<main class="page-container">
    <div class="form-card">
        <h1>Create an Account</h1>

        <p class="alert alert-error" th:if="${error != null}" th:text="${error}"></p>

        <form action="/register" method="post" th:object="${form}">
            <div class="field">
                <label for="username">Username</label>
                <input type="text" id="username" th:field="*{username}" required minlength="3" maxlength="20">
            </div>
            <div class="field">
                <label for="email">Email</label>
                <input type="email" id="email" th:field="*{email}" required>
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" th:field="*{password}" required minlength="6">
            </div>
            <div class="field">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" th:field="*{confirmPassword}" required minlength="6">
            </div>
            <button type="submit" class="btn-block">Sign Up</button>
        </form>

        <p class="form-footer-link">Already have an account? <a href="/login">Log in</a></p>
    </div>
</main>

<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
