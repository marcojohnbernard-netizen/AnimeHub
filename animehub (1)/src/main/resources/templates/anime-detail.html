<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments :: head(${anime.title})}"></head>
<body>
<div th:replace="~{fragments :: header}"></div>

<main class="page-container">
    <div class="detail-layout">
        <div class="detail-poster">
            <img th:src="${anime.posterUrl}" th:alt="${anime.title}">

            <!-- Watchlist controls - shown only when logged in -->
            <div sec:authorize="isAuthenticated()" style="margin-top:1rem;">
                <form th:if="${inWatchlist == null or !inWatchlist}" action="/watchlist/add" method="post">
                    <input type="hidden" name="malId" th:value="${anime.malId}">
                    <input type="hidden" name="title" th:value="${anime.title}">
                    <input type="hidden" name="imageUrl" th:value="${anime.posterUrl}">
                    <input type="hidden" name="redirectTo" th:value="${'/anime/' + anime.malId}">
                    <button type="submit" class="btn-block">+ Add to My List</button>
                </form>
                <form th:if="${inWatchlist != null and inWatchlist}" action="/watchlist/remove" method="post">
                    <input type="hidden" name="malId" th:value="${anime.malId}">
                    <input type="hidden" name="redirectTo" th:value="${'/anime/' + anime.malId}">
                    <button type="submit" class="btn-block" style="background:var(--surface-2); color:var(--accent); border:1px solid var(--accent-dim);">
                        ✓ On My List — Remove
                    </button>
                </form>

                <!-- Episode progress tracker (manual, MAL/AniList-style - not a video player) -->
                <div th:if="${inWatchlist != null and inWatchlist}" style="margin-top:0.9rem; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:0.8rem;">
                    <p style="margin:0 0 0.5rem; font-size:0.85rem; color:var(--text-muted);">Your progress</p>
                    <form action="/watchlist/episode" method="post" style="display:flex; align-items:center; gap:0.5rem;">
                        <input type="hidden" name="malId" th:value="${anime.malId}">
                        <input type="hidden" name="redirectTo" th:value="${'/anime/' + anime.malId}">
                        <span class="episode-badge" th:text="'Ep. ' + ${episodeProgress} + (${anime.episodes} != null ? ' / ' + ${anime.episodes} : '')">Ep. 0</span>
                        <input type="number" name="episode" min="0" th:max="${anime.episodes}" th:value="${episodeProgress}"
                               style="width:60px; background:var(--surface-2); border:1px solid var(--border); color:var(--text); border-radius:6px; padding:0.3rem;">
                        <button type="submit" class="btn-ghost" style="font-size:0.8rem; padding:0.4rem 0.7rem;">Update</button>
                    </form>
                </div>
            </div>
            <a sec:authorize="!isAuthenticated()" href="/login" class="btn-block" style="display:block; text-align:center;">
                Login to add to your list
            </a>
        </div>

        <div class="detail-info">
            <h1 th:text="${anime.title}">Anime Title</h1>
            <p th:if="${anime.titleEnglish != null and anime.titleEnglish != anime.title}"
               style="color:var(--text-muted); margin-top:-0.5rem;" th:text="${anime.titleEnglish}"></p>

            <div>
                <span class="genre-tag" th:each="genre : ${anime.genres}" th:text="${genre.name}">Genre</span>
            </div>

            <div class="detail-meta-row">
                <span th:if="${anime.score != null}">Score: <strong th:text="${anime.score}">0.0</strong></span>
                <span th:if="${anime.rank != null}">Rank: <strong th:text="'#' + ${anime.rank}">#1</strong></span>
                <span th:if="${anime.episodes != null}">Episodes: <strong th:text="${anime.episodes}">?</strong></span>
                <span th:if="${anime.year != null}">Year: <strong th:text="${anime.year}">2024</strong></span>
                <span th:if="${anime.status != null}">Status: <strong th:text="${anime.status}">Airing</strong></span>
            </div>

            <p class="synopsis" th:text="${anime.synopsis != null ? anime.synopsis : 'No synopsis available.'}">
                Synopsis text here.
            </p>

            <div class="trailer-wrap" th:if="${anime.trailer != null and anime.trailer.youtubeId != null}">
                <iframe th:src="'https://www.youtube.com/embed/' + ${anime.trailer.youtubeId}"
                        title="Official trailer" allowfullscreen></iframe>
            </div>
            <p th:if="${anime.trailer == null or anime.trailer.youtubeId == null}" style="color:var(--text-muted);">
                No official trailer available.
            </p>
        </div>
    </div>
</main>

<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
