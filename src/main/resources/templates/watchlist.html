<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('My List')}"></head>
<body>
<div th:replace="~{fragments :: header}"></div>

<main class="page-container">
    <div class="section-title">
        <h2>📋 My List</h2>
    </div>

    <table class="watchlist-table" th:if="${not #lists.isEmpty(items)}">
        <thead>
        <tr>
            <th></th>
            <th>Title</th>
            <th>Status</th>
            <th>Idinagdag</th>
            <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="item : ${items}">
            <td><img th:src="${item.animeImageUrl}" th:alt="${item.animeTitle}"></td>
            <td>
                <a th:href="@{/anime/{id}(id=${item.animeMalId})}" th:text="${item.animeTitle}" style="color:var(--text); font-weight:600;"></a>
            </td>
            <td>
                <form action="/watchlist/status" method="post" style="display:flex; gap:0.4rem; align-items:center;">
                    <input type="hidden" name="malId" th:value="${item.animeMalId}">
                    <select name="status" onchange="this.form.submit()">
                        <option th:each="s : ${statuses}" th:value="${s}" th:text="${s.label}"
                                th:selected="${s == item.status}"></option>
                    </select>
                </form>
            </td>
            <td th:text="${#temporals.format(item.addedAt, 'MMM d, yyyy')}" style="color:var(--text-muted); font-size:0.85rem;"></td>
            <td>
                <form action="/watchlist/remove" method="post">
                    <input type="hidden" name="malId" th:value="${item.animeMalId}">
                    <button type="submit" class="btn-remove">Alisin</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <div class="empty-state" th:if="${#lists.isEmpty(items)}">
        <p>Walang anime sa list mo pa.</p>
        <a href="/" class="btn-primary">Maghanap ng panoorin →</a>
    </div>
</main>

<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
