<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Search')}"></head>
<body>
<div th:replace="~{fragments :: header}"></div>

<main class="page-container">
    <div class="section-title">
        <h2 th:text="${query != null and !query.isBlank()} ? 'Results for &quot;' + ${query} + '&quot;' : 'Search Anime'">Search</h2>
    </div>

    <form action="/search" method="get" style="max-width:480px; display:flex; gap:0.6rem; margin-bottom:1.5rem;">
        <input type="text" name="q" th:value="${query}" placeholder="e.g. Jujutsu Kaisen, One Piece..."
               style="flex:1; background:var(--surface); border:1px solid var(--border); color:var(--text); padding:0.6rem 0.8rem; border-radius:10px;">
        <button type="submit" class="btn-primary">Search</button>
    </form>

    <div class="anime-grid" th:if="${not #lists.isEmpty(results)}">
        <a th:each="anime : ${results}" th:href="@{/anime/{id}(id=${anime.malId})}" class="anime-card">
            <div class="poster-wrap">
                <img th:src="${anime.posterUrl}" th:alt="${anime.title}" loading="lazy">
            </div>
            <div class="card-body">
                <p class="card-title" th:text="${anime.title}">Anime Title</p>
                <div class="card-meta">
                    <span th:text="${anime.type}">TV</span>
                    <span class="score-badge" th:if="${anime.score != null}" th:text="'★ ' + ${anime.score}">★ 0.0</span>
                </div>
            </div>
        </a>
    </div>

    <p class="empty-state" th:if="${query != null and !query.isBlank() and #lists.isEmpty(results)}">
        No anime found for "<span th:text="${query}"></span>". Try a different keyword.
    </p>

    <div class="pagination" th:if="${not #lists.isEmpty(results)}">
        <a th:if="${currentPage > 1}" th:href="@{/search(q=${query}, page=${currentPage - 1})}">← Previous</a>
        <a th:href="@{/search(q=${query}, page=${currentPage + 1})}">Next →</a>
    </div>
</main>

<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
